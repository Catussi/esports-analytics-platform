services:
  - type: web
    name: esports-analytics-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL
        value: "true"
      - key: ML_MODEL_PATH
        value: app/ml/models/kmeans_pca_model.joblib
      - key: CSV_PATH
        value: /data/CSGO.csv
      - key: RUN_TRAIN_MODEL
        value: "false"
      - key: RUN_SEED
        value: "false"
      - key: CORS_ORIGINS
        sync: false
