# eSports Analytics Platform - local infrastructure
name: esports-analytics-platform

services:
  mysql:
    image: mysql:8.0
    container_name: esports-analytics-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: esports_analytics
      MYSQL_USER: esports_user
      MYSQL_PASSWORD: changeme
    volumes:
      - esports_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uesports_user
        - -pchangeme
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: esports-analytics-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: esports_user
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: esports_analytics
      ML_MODEL_PATH: app/ml/models/kmeans_pca_model.joblib
      CSV_PATH: /data/CSGO.csv
      RUN_SEED: "false"
      RUN_TRAIN_MODEL: "true"
      CORS_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200"
    volumes:
      - api_ml_models:/app/app/ml/models
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  esports_mysql_data:
  api_ml_models:
